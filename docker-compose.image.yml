# Run a pre-built image from GitHub Container Registry (no clone / no local build).
# Replace nimijneb with your GitHub username or org if you forked the project.
# After the "Publish Docker image" workflow has run on main, pull and start:
#   docker compose -f docker-compose.image.yml pull && docker compose -f docker-compose.image.yml up -d
services:
  envelope-budget:
    image: ghcr.io/nimijneb/envelope-budget:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?Set ADMIN_USERNAME in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      PORT: "4000"
      DATABASE_PATH: /data/envelopes.db
    volumes:
      - envelope_budget_data:/data

volumes:
  envelope_budget_data:
