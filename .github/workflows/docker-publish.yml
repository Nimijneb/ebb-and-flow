# Build and push to GitHub Container Registry (ghcr.io).
# Free for public repositories; image is pullable without logging in once the
# package visibility is set to public (Package settings → Change visibility).
name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      # Use Node 24 for JS-based actions (Node 20 deprecated on runners); safe to remove
      # once all pinned actions default to Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev --workspaces --include-workspace-root

      - name: Registry image name (GHCR requires lowercase)
        id: image
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/envelope-budget" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
